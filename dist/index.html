<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>麻雀点数計算</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="./assets/index-C4LzQcCe.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DOX8Vw5F.css">
  </head>
  <body>
    <div class="app-container">
      <header>
        <h1>麻雀点数計算</h1>
      </header>

      <main>
        <!-- 手牌・ドラ表示エリア -->
        <div class="glass-panel hand-panel">
          <div class="panel-section">
            <div class="section-header">
              <h3>手牌 <span id="hand-count" class="badge">0 / 14</span></h3>
              <span class="hint">14枚目が和了（あがり）牌</span>
            </div>
            <div id="hand-tiles" class="tiles-display empty">
              <!-- JSで牌が追加される -->
            </div>
          </div>
          
          <div class="panel-section">
            <div class="section-header">
              <h3>ドラ表示牌</h3>
            </div>
            <div id="dora-tiles" class="tiles-display empty">
              <!-- JSで牌が追加される -->
            </div>
          </div>
        </div>

        <!-- 牌キーボード -->
        <div class="glass-panel keyboard-panel">
          <div class="keyboard-row" id="kb-manzu"></div>
          <div class="keyboard-row" id="kb-pinzu"></div>
          <div class="keyboard-row" id="kb-sozu"></div>
          <div class="keyboard-row" id="kb-jihai"></div>
          
          <div class="keyboard-controls">
            <button id="btn-backspace" class="control-btn">⌫ 1枚消す</button>
            <button id="btn-clear" class="control-btn danger">✖ すべて消す</button>
            <button id="btn-toggle-dora" class="control-btn outline">ドラ入力モード: OFF</button>
          </div>
        </div>

        <!-- 条件選択エリア -->
        <div class="glass-panel conditions-panel">
          <div class="controls-row">
            <div class="toggle-group">
              <label>親 / 子 (自風)</label>
              <div class="segmented-control" id="wind-toggle">
                <input type="radio" name="wind" id="wind-east" value="1">
                <label for="wind-east">東 (親)</label>
                <input type="radio" name="wind" id="wind-south" value="2" checked>
                <label for="wind-south">南 (子)</label>
                <input type="radio" name="wind" id="wind-west" value="3">
                <label for="wind-west">西 (子)</label>
                <input type="radio" name="wind" id="wind-north" value="4">
                <label for="wind-north">北 (子)</label>
              </div>
            </div>
          </div>

          <div class="controls-row">
            <div class="toggle-group">
              <label>ツモ / ロン</label>
              <div class="segmented-control" id="win-type-toggle">
                <input type="radio" name="win-type" id="tsumo" value="tsumo">
                <label for="tsumo">ツモ</label>
                <input type="radio" name="win-type" id="ron" value="ron" checked>
                <label for="ron">ロン</label>
              </div>
            </div>
            <div class="toggle-group">
              <label>場風</label>
              <div class="segmented-control" id="bakaze-toggle">
                <input type="radio" name="bakaze" id="bakaze-east" value="1" checked>
                <label for="bakaze-east">東</label>
                <input type="radio" name="bakaze" id="bakaze-south" value="2">
                <label for="bakaze-south">南</label>
              </div>
            </div>
          </div>

          <div class="controls-row">
            <div class="toggle-group">
              <label>特別役</label>
              <div class="checkbox-group" id="extra-yaku-group">
                <input type="checkbox" id="chk-riichi" value="r">
                <label for="chk-riichi">リーチ</label>
                
                <input type="checkbox" id="chk-ippatsu" value="i">
                <label for="chk-ippatsu">一発</label>
                
                <input type="checkbox" id="chk-w-riichi" value="w">
                <label for="chk-w-riichi">Wリーチ</label>
                
                <input type="checkbox" id="chk-tenhou" value="t">
                <label for="chk-tenhou">天和系</label>
                
                <input type="checkbox" id="chk-haitei" value="h">
                <label for="chk-haitei">海底系</label>
                
                <input type="checkbox" id="chk-rinshan" value="k">
                <label for="chk-rinshan">嶺上/槍槓</label>
              </div>
            </div>
          </div>
        </div>

        <!-- 計算結果パネル -->
        <div class="result-panel">
          <div class="score-main">
            <div class="score-label" id="score-name">未完成の手牌です</div>
            <div class="score-value" id="score-total">--</div>
            <div class="score-breakdown" id="score-breakdown">--</div>
          </div>
          
          <div class="yaku-details">
            <h4>成立役・詳細</h4>
            <ul id="yaku-list" class="yaku-list">
              <li class="empty-yaku">役がありません</li>
            </ul>
          </div>
        </div>

      </main>
    </div>
  </body>
</html>
